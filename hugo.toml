baseURL = 'https://crsanders.github.io/'
locale = 'en-us'
title = 'Christian Sanders'
theme = "mana"
[markup.goldmark.renderHooks.image]
enableDefault = true
[markup.goldmark.renderHooks.link]
enableDefault = true

[caches]
  [caches.images]
    dir = ':cacheDir/images'

[params]
  description = "A place for musings, ramblings, and progress records"
  favicon = "/favicon/favicon.ico"
  footerText = "Built with Hugo and Mana theme"  # Optional
  
  # Hero section title (optional - defaults to site.Title)
  heroTitleLine1 = "Blog"  # First line of hero title
  heroTitleLine2 = ""    # Second line of hero title (optional)
  [params.avatar]
  [params.avatar.home]
    assetPath = "/images/sphere.png"
  [params.avatar.about]
    assetPath = "/images/sphere.png"